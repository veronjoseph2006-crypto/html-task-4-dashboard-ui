<!DOCTYPE html>
<html>

<head>
    <title>Dashboard UI</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="container">
        <h1>Dashboard</h1>

        <div class="cards">
            <div class="card blue">
                <h3>Visitors</h3>
                <p>1294</p>
            </div>
            <div class="card lightblue">
                <h3>Subcribers</h3>
                <p>1303</p>
            </div>
            <div class="card green">
                <h3>Sales</h3>
                <p>$1,345</p>

            </div>
            <div class="card purple">
                <h3>Order</h3>
                <p>576</p>
            </div>

        </div>
        <div class="cards">

            <div class="card white">
                <h3>Number</h3>
                <p>150GB</p>
            </div>

            <div class="card white">
                <h3>Revenue</h3>
                <p>$1345</p>
            </div>

            <div class="card white">
                <h3>Errors</h3>
                <p>23</p>
            </div>

            <div class="card white">
                <h3>Followers</h3>
                <p>+45K</p>
            </div>

        </div>

    </div>

</body>

</html>
